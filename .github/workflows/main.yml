name: 📘 ساخت PDF و HTML کتاب (مطابق مستندات رسمی)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ۱. کلون بازگشتی (با submoduleها)
      - name: 📥 دریافت کد کتاب
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ۲. نصب پیش‌نیازها
      - name: 🧰 نصب بسته‌های لازم
        run: |
          sudo apt-get update
          # ابزارهای PDF
          sudo apt-get install -y texlive-xetex texlive-latex-extra pandoc python3 python3-pip make wget
          pip3 install markdown
          # PHP (برای ساخت سایت آفلاین)
          sudo apt-get install -y php-cli
          # glslViewer
          GLSL_VERSION="3.5.2"
          wget -q "https://github.com/patriciogonzalezvivo/glslViewer/releases/download/${GLSL_VERSION}/glslViewer-${GLSL_VERSION}-amd64.deb" -O glslViewer.deb
          dpkg-deb -x glslViewer.deb glsl_extract
          sudo cp glsl_extract/usr/bin/glslViewer /usr/local/bin/
          # گرافیک
          sudo apt-get install -y libgl1 libglfw3 xvfb

      # ۳. ساخت PDF (دقیقاً مطابق Appendix 02)
      - name: 📄 ساخت PDF
        run: xvfb-run make pdf

      # ۴. ساخت نسخه HTML آفلاین (دقیقاً مطابق Appendix 00)
     # - name: 🌐 ساخت سایت HTML
       # run: |
          # راه‌اندازی سرور PHP داخلی روی پورت 8000 در پس‌زمینه
        #  php -S localhost:8000 > /dev/null 2>&1 &
         # sleep 3
          # آینه کردن وب‌سایت
         # mkdir -p website_mirror
         # cd website_mirror
         # wget --mirror --convert-links --adjust-extension --no-parent --wait=1 --random-wait http://localhost:8000/ || true
         # if [ -d "localhost:8000" ]; then
          #  mv localhost:8000/* .
           # rm -rf localhost:8000
         # fi

      # ۵. ذخیره‌سازی خروجی‌ها
      - name: 💾 کامیت فایل‌ها
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '📚 کتاب آماده شد (PDF و HTML)'
          file_pattern: 'book.pdf website_mirror/*'
          commit_user_name: 'GitHub Action'
          commit_user_email: 'action@github.com'
